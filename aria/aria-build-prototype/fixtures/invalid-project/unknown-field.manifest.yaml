manifest:
  id: "auth.token.validate.signature"
  version: "1.0.0"
  schema_version: "1.0"

  identity:
    purpose: "Validates the cryptographic signature of an authentication token"
    domain: "auth"
    subdomain: "token"
    verb: "validate"
    entity: "signature"

  layer:
    declared: L1
    inferred: L1

  contract:
    input:
      type: "AuthToken"
    output:
      success: "ValidatedToken"
      failure: "AuthError.INVALID_SIGNATURE"
    side_effects: NONE
    idempotent: true
    deterministic: true

  unknown_field_that_should_fail: "this is not allowed"  # INVALID

  dependencies:
    - id: "auth.token"
      layer: L0
      stability: STABLE

  context_budget:
    to_use: 150
    to_modify: 400
    to_extend: 600
    to_replace: 800

  test_contract:
    scenarios:
      - scenario: "Valid token signature passes"
    coverage_required: true

  stability: STABLE

  lifecycle:
    phase: STABLE
    stable_since: "2024-01-01T00:00:00Z"

  manifest_provenance:
    derived_by: "AI_PROPOSED"
    reviewed_by: "REVIEWER_AGENT"
    approved_at: "2024-01-01T00:00:00Z"
